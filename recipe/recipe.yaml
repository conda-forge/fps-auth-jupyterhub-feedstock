schema_version: 1

context:
  version: "0.10.0"

package:
  name: fps-auth-jupyterhub
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-auth-jupyterhub/fps_auth_jupyterhub-${{ version }}.tar.gz
    sha256: 88b43d1e8a9f3d0ceb48c48a8d6a9438d534e91bd9fbb7f9db351c51644b5717

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0
    - aiosqlite <0.22.0
    - jupyterhub >=4.0.1,<5

tests:
  - requirements:
      run:
        - python ${{ python_min }}.*
        - rich-click
        - pip
    script:
      - pip check
      - python -c "import fps_auth_jupyterhub"

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/auth_jupyterhub
  summary: An FPS plugin for the authentication API, using JupyterHub.

extra:
  recipe-maintainers:
    - davidbrochart
